name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # TypeScript type check of the frontend. Runs independently of the build
  # (Vite/esbuild transpiles without type-checking), so this is the only gate
  # that catches type regressions such as passing a prop RSuite does not accept.
  typecheck:
    name: Typecheck frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: st_rsuite/frontend/package-lock.json
      - run: npm ci
        working-directory: st_rsuite/frontend
      - run: npm run typecheck
        working-directory: st_rsuite/frontend

  # Build the frontend once and share the built assets with every test leg.
  # build/ is gitignored, so without this the package can't register components.
  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: st_rsuite/frontend/package-lock.json
      - run: npm ci && npm run build
        working-directory: st_rsuite/frontend
      - name: Assert production build
        run: bash scripts/assert_prod_build.sh
      - run: tar czf frontend-build.tgz st_rsuite/frontend/build
      - uses: actions/upload-artifact@v7
        with:
          name: frontend-build
          path: frontend-build.tgz
          retention-days: 1

  # Fast, browser-less guard across every supported Streamlit minor: a real
  # `streamlit run` would register the shared component every widget renders
  # through, and the compat layer can disable style isolation (at registration
  # on >=1.53, call site on 1.51/1.52).
  smoke:
    name: Smoke (Streamlit ${{ matrix.streamlit || 'latest' }})
    needs: build-frontend
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        streamlit: ['1.51.*', '1.52.*', '1.53.*', '1.54.*', '1.55.*', '1.56.*', '1.57.*', '1.58.*', '']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v7
        with:
          name: frontend-build
      - run: tar xzf frontend-build.tgz
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --group dev
      - name: Select Streamlit version
        run: |
          if [ -n "${{ matrix.streamlit }}" ]; then
            uv pip install "streamlit==${{ matrix.streamlit }}"
          else
            uv pip install -U streamlit
          fi
      - run: uv run --no-sync python -c "import streamlit; print('streamlit', streamlit.__version__)"
      - run: uv run --no-sync pytest test/test_registration_smoke.py -v

  # Real-browser coverage: every component renders and round-trips on a real
  # Streamlit server. Authoritative guard for the asset_dir registration bug.
  e2e:
    name: e2e (Streamlit ${{ matrix.streamlit || 'latest' }})
    needs: build-frontend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        streamlit: ['1.51.*', '1.52.*', '1.53.*', '1.55.*', '']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v7
        with:
          name: frontend-build
      - run: tar xzf frontend-build.tgz
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --group dev
      - name: Select Streamlit version
        run: |
          if [ -n "${{ matrix.streamlit }}" ]; then
            uv pip install "streamlit==${{ matrix.streamlit }}"
          else
            uv pip install -U streamlit
          fi
      - run: uv run --no-sync playwright install --with-deps chromium
      - run: uv run --no-sync python -c "import streamlit; print('streamlit', streamlit.__version__)"
      - run: uv run --no-sync pytest test/test_ccv2_e2e.py test/test_single_bundle_e2e.py test/test_select_tag_e2e.py test/test_cascader_tree_e2e.py -v
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-results-st${{ matrix.streamlit || 'latest' }}
          path: test-results/
          retention-days: 7

  # Guard the wheel itself: the runtime manifest and built JS must ship, or
  # every user hits "must be declared ... with asset_dir" regardless of version.
  package:
    name: Wheel contents
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: st_rsuite/frontend/package-lock.json
      - run: npm ci && npm run build
        working-directory: st_rsuite/frontend
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - uses: astral-sh/setup-uv@v7
      - run: uv build --wheel
      - name: Assert wheel ships the manifest and built assets
        run: |
          uv run --no-project python - <<'PY'
          import fnmatch, glob, zipfile
          whl = sorted(glob.glob("dist/*.whl"))[-1]
          names = set(zipfile.ZipFile(whl).namelist())
          assert "st_rsuite/pyproject.toml" in names, "wheel is missing st_rsuite/pyproject.toml"
          prefix = "st_rsuite/frontend/build/"
          built = [n[len(prefix):] for n in names if n.startswith(prefix)]
          entries = fnmatch.filter(built, "index-*.js")
          assert len(entries) == 1, \
              f"wheel must ship exactly one index-*.js entry (js glob), found {entries}"
          locales = fnmatch.filter(built, "chunk-*.js")
          assert locales, "wheel is missing the shared/locale chunks"
          maps = fnmatch.filter(built, "*.js.map")
          assert not maps, f"wheel must not ship sourcemaps, found {maps}"
          stale = [n for n in names if "/frontend/" in n and not n.startswith(prefix)]
          assert not stale, \
              f"wheel ships stale per-component frontend files (wipe build/lib): {stale[:5]}"
          print(f"OK: {whl} ships the manifest, one entry, and {len(locales)} chunks")
          PY
